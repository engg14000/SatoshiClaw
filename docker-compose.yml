version: '3.8'

services:
  sathoshiclaw:
    build: .
    container_name: sathoshiclaw
    restart: always
    volumes:
      - ./auth_info_baileys:/app/auth_info_baileys
      - ./stats.json:/app/stats.json
      - ./.env:/app/.env
    # Enable these if you want to use Console Gateway inside Docker (attach with docker attach)
    tty: true
    stdin_open: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
